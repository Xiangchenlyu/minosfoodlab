            }

            }

        // 设置事件监听器
        function setupEventListeners() {
            // 滚动事件 - 折叠顶部图片
            menuItemsContainerScroll.addEventListener('scroll', () => {
                const scrollTop = menuItemsContainerScroll.scrollTop;
                const maxScroll = 200; // 最大滚动距离
                
                // 计算透明度和高度
                const opacity = Math.max(0, 1 - scrollTop / maxScroll);
                const scale = Math.max(0.8, 1 - scrollTop / (maxScroll * 2));
                const height = Math.max(0, 192 - (scrollTop * 0.96)); // 192px * 0.96 = 184px，完全消失
                
                headerImage.style.height = `${height}px`;
                headerImage.style.opacity = opacity;
                headerImage.style.transform = `scale(${scale})`;
                headerImage.style.transformOrigin = 'top center';
            });
            
            // 类别切换
            categoryItems.forEach(item => {
                item.addEventListener('click', () => {
                    categoryItems.forEach(cat => cat.classList.remove('category-active'));
                    item.classList.add('category-active');
                    const category = item.dataset.category;
                    renderMenuItems(category);
                });
            });

            // 菜品点击事件 - 打开详情模态框
            menuItemsContainer.addEventListener('click', (e) => {
                const menuItem = e.target.closest('.menu-item');
                if (menuItem && !e.target.closest('.add-to-cart')) {
                    const itemId = parseInt(menuItem.querySelector('.add-to-cart').dataset.id);
                    openItemDetail(itemId);
                }
            });

            // 添加到购物车 - 带吸入动画效果（保留原菜品）
            menuItemsContainer.addEventListener('click', (e) => {
                if (e.target.closest('.add-to-cart')) {
                    const button = e.target.closest('.add-to-cart');
                    const id = parseInt(button.dataset.id);
                    const itemElement = button.closest('.menu-item');
                    
                    // 创建菜品克隆用于动画
                    const itemClone = itemElement.cloneNode(true);
                    itemClone.style.position = 'absolute';
                    itemClone.style.zIndex = '1000';
                    itemClone.style.pointerEvents = 'none';
                    itemClone.style.width = `${itemElement.offsetWidth}px`;
                    itemClone.style.height = `${itemElement.offsetHeight}px`;
                    itemClone.style.transformOrigin = 'center center';
                    
                    // 获取原始位置
                    const rect = itemElement.getBoundingClientRect();
                    itemClone.style.left = `${rect.left}px`;
                    itemClone.style.top = `${rect.top}px`;
                    
                    // 添加到页面
                    document.body.appendChild(itemClone);
                    
                    // 获取购物车位置
                    const cartRect = cartButtonContainer.getBoundingClientRect();
                    const cartCenterX = cartRect.left + cartRect.width / 2;
                    const cartCenterY = cartRect.top + cartRect.height / 2;
                    
                    // 计算目标位置和缩放
                    const targetX = cartCenterX - rect.left - rect.width / 2;
                    const targetY = cartCenterY - rect.top - rect.height / 2;
                    
                    // 创建动画关键帧
                    const animateSuckIntoCart = () => {
                        // 第一阶段：准备阶段 - 轻微放大
                        itemClone.style.transition = 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
                        itemClone.style.transform = 'scale(1.05)';
                        
                        setTimeout(() => {
                            // 第二阶段：吸入阶段 - 快速移动并缩小
                            itemClone.style.transition = 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                            itemClone.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.1)`;
                            itemClone.style.opacity = '0.7';
                            itemClone.style.filter = 'blur(2px)';
                            
                            // 创建购物车吸引力效果
                            cartButtonContainer.style.animation = 'pulse 0.6s ease-in-out';
                            
                            setTimeout(() => {
                                // 第三阶段：消失阶段
                                itemClone.style.transition = 'all 0.2s ease-out';
                                itemClone.style.opacity = '0';
                                
                                setTimeout(() => {
                                    // 移除克隆元素
                                    document.body.removeChild(itemClone);
                                    
                                    // 清除购物车动画
                                    cartButtonContainer.style.animation = '';
                                    
                                    // 添加到购物车
                                    addToCart(id);
                                    
                                    // 购物车弹跳效果
                                    cartButtonContainer.classList.add('cart-bounce');
                                    setTimeout(() => cartButtonContainer.classList.remove('cart-bounce'), 500);
                                    
                                    // 不自动显示购物车
                                    // cartSidebar.classList.remove('translate-x-full');
                                    // overlay.classList.remove('hidden');
                                    
                                    // 为新添加的购物车项目添加进入动画
                                    setTimeout(() => {
                                        const cartItems = cartItemsContainer.querySelectorAll('.flex.items-center.justify-between.py-3.border-b');
                                        if (cartItems.length > 0) {
                                            const lastItem = cartItems[cartItems.length - 1];
                                            lastItem.classList.add('cart-item-enter');
                                        }
                                    }, 100);
                                }, 200);
                            }, 600);
                        }, 200);
                    };
                    
                    // 开始动画
                    animateSuckIntoCart();
                }
            });

            // 购物车按钮点击 - 防止拖拽时误触发
            let clickTimer;
            let isClick = true;
            
            cartButton.addEventListener('mousedown', () => {
                isClick = true;
                clickTimer = setTimeout(() => {
                    isClick = false;
                }, 100); // 100ms内视为点击，超过视为拖拽
            });
            
            cartButton.addEventListener('mouseup', () => {
                clearTimeout(clickTimer);
            });
            
            cartButton.addEventListener('click', (e) => {
                if (isClick && !isDragging) {
                    cartSidebar.classList.remove('translate-x-full');
                    overlay.classList.remove('hidden');
                }
            });
            
            // 触摸设备支持
            cartButton.addEventListener('touchstart', () => {
                isClick = true;
                clickTimer = setTimeout(() => {
                    isClick = false;
                }, 100);
            });
            
            cartButton.addEventListener('touchend', () => {
                clearTimeout(clickTimer);
                if (isClick && !isDragging) {
                    cartSidebar.classList.remove('translate-x-full');
                    overlay.classList.remove('hidden');
                }
            });
            
            // 购物车按钮拖动功能 - 带平滑动画
            let isDragging = false;
            let offsetX, offsetY;
            let lastX, lastY;
            let velocityX = 0, velocityY = 0;
            let animationFrameId;
            
            // 平滑移动函数
            function smoothMove() {
                if (!isDragging) {
                    // 添加惯性效果
                    velocityX *= 0.95;
                    velocityY *= 0.95;
                    
                    if (Math.abs(velocityX) < 0.5 && Math.abs(velocityY) < 0.5) {
                        velocityX = 0;
                        velocityY = 0;
                        cancelAnimationFrame(animationFrameId);
                        return;
                    }
                    
                    let x = parseFloat(cartButtonContainer.style.left) + velocityX;
                    let y = parseFloat(cartButtonContainer.style.top) + velocityY;
                    
                    // 限制在视口内
                    const maxX = window.innerWidth - cartButtonContainer.offsetWidth;
                    const maxY = window.innerHeight - cartButtonContainer.offsetHeight;
                    
                    const boundedX = Math.max(0, Math.min(x, maxX));
                    const boundedY = Math.max(0, Math.min(y, maxY));
                    
                    // 如果碰到边界，反弹效果
                    if (boundedX !== x) velocityX *= -0.5;
                    if (boundedY !== y) velocityY *= -0.5;
                    
                    cartButtonContainer.style.left = `${boundedX}px`;
                    cartButtonContainer.style.top = `${boundedY}px`;
                    
                    animationFrameId = requestAnimationFrame(smoothMove);
                }
            }
            
            cartButtonContainer.addEventListener('mousedown', (e) => {
                isDragging = true;
                const rect = cartButtonContainer.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                lastX = e.clientX;
                lastY = e.clientY;
                cartButtonContainer.style.transition = 'none'; // 拖动时禁用过渡
                cartButtonContainer.style.cursor = 'grabbing';
                cancelAnimationFrame(animationFrameId);
                velocityX = 0;
                velocityY = 0;
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const currentX = e.clientX;
                const currentY = e.clientY;
                
                // 计算速度
                velocityX = currentX - lastX;
                velocityY = currentY - lastY;
                lastX = currentX;
                lastY = currentY;
                
                const x = currentX - offsetX;
                const y = currentY - offsetY;
                
                // 限制在视口内
                const maxX = window.innerWidth - cartButtonContainer.offsetWidth;
                const maxY = window.innerHeight - cartButtonContainer.offsetHeight;
                
                const boundedX = Math.max(0, Math.min(x, maxX));
                const boundedY = Math.max(0, Math.min(y, maxY));
                
                cartButtonContainer.style.left = `${boundedX}px`;
                cartButtonContainer.style.top = `${boundedY}px`;
                cartButtonContainer.style.right = 'auto';
                cartButtonContainer.style.bottom = 'auto';
            });
            
            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    cartButtonContainer.style.transition = 'transform 0.1s ease-out';
                    cartButtonContainer.style.cursor = 'grab';
                    // 开始惯性动画
                    smoothMove();
                }
            });
            
            // 触摸设备支持
            cartButtonContainer.addEventListener('touchstart', (e) => {
                isDragging = true;
                const touch = e.touches[0];
                const rect = cartButtonContainer.getBoundingClientRect();
                offsetX = touch.clientX - rect.left;
                offsetY = touch.clientY - rect.top;
                lastX = touch.clientX;
                lastY = touch.clientY;
                cartButtonContainer.style.transition = 'none';
                e.preventDefault();
                cancelAnimationFrame(animationFrameId);
                velocityX = 0;
                velocityY = 0;
            });
            
            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                
                const touch = e.touches[0];
                const currentX = touch.clientX;
                const currentY = touch.clientY;
                
                // 计算速度
                velocityX = currentX - lastX;
                velocityY = currentY - lastY;
                lastX = currentX;
                lastY = currentY;
                
                const x = currentX - offsetX;
                const y = currentY - offsetY;
                
                // 限制在视口内
                const maxX = window.innerWidth - cartButtonContainer.offsetWidth;
                const maxY = window.innerHeight - cartButtonContainer.offsetHeight;
                
                const boundedX = Math.max(0, Math.min(x, maxX));
                const boundedY = Math.max(0, Math.min(y, maxY));
                
                cartButtonContainer.style.left = `${boundedX}px`;
                cartButtonContainer.style.top = `${boundedY}px`;
                cartButtonContainer.style.right = 'auto';
                cartButtonContainer.style.bottom = 'auto';
                
                e.preventDefault();
            });
            
            document.addEventListener('touchend', () => {
                if (isDragging) {
                    isDragging = false;
                    cartButtonContainer.style.transition = 'transform 0.1s ease-out';
                    // 开始惯性动画
                    smoothMove();
                }
            });

            // 关闭购物车
            closeCart.addEventListener('click', closeCartSidebar);
            overlay.addEventListener('click', closeCartSidebar);

            // 结算按钮
            checkoutButton.addEventListener('click', () => {
                if (cart.length > 0) {
                    alert('感谢您的购买！订单已提交。');
                    clearCart();
                }
            });

            // 菜品详情模态框事件
            closeDetailModal.addEventListener('click', closeItemDetail);
            
            // 图片轮播功能
            let currentSlide = 0;
            let startX, moveX;
            const imageSlider = document.getElementById('imageSlider');
            const sliderIndicators = document.getElementById('sliderIndicators');

            // 触摸开始
            imageSlider.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                imageSlider.style.transition = 'none';
            });

            // 触摸移动
            imageSlider.addEventListener('touchmove', (e) => {
                moveX = e.touches[0].clientX;
                const diff = moveX - startX;
                const translateX = -currentSlide * 100 + (diff / window.innerWidth) * 100;
                imageSlider.style.transform = `translateX(${translateX}%)`;
            });

            // 触摸结束
            imageSlider.addEventListener('touchend', (e) => {
                const diff = moveX - startX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentSlide > 0) {
                        currentSlide--;
                    } else if (diff < 0 && currentSlide < sliderIndicators.children.length - 1) {
                        currentSlide++;
                    }
                }
                updateSlider();
            });
        }

        // 打开菜品详情

                // 获取购物车位置

                const cartCenterY = cartRect.top + cartRect.height / 2;
                
                // 计算目标位置
                const targetX = cartCenterX - buttonRect.left - buttonRect.width / 2;
                const targetY = cartCenterY - buttonRect.top - buttonRect.height / 2;
                
                // 创建动画
                tempElement.style.transition = 'all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                tempElement.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.1)`;
                tempElement.style.opacity = '0.7';
                
                // 购物车吸引力效果
                cartButtonContainer.style.animation = 'pulse 0.6s ease-in-out';
                
                // 动画结束后添加到购物车并清理

                    cartButtonContainer.style.animation = '';

                    // 购物车弹跳效果

                }, 600);
            };

            // 加载图片轮播
            const imageSlider = document.getElementById('imageSlider');
            const sliderIndicators = document.getElementById('sliderIndicators');
            imageSlider.innerHTML = '';
            sliderIndicators.innerHTML = '';

            // 优先使用detailImages，如果没有则使用item.image
            const images = item.detailImages && item.detailImages.length > 0 ? item.detailImages : [item.image];
            images.forEach((imgSrc, index) => {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'w-full h-full flex-shrink-0';
                imgDiv.innerHTML = `<img src="${imgSrc}" alt="${item.name}" class="w-full h-full object-contain">`;
                imageSlider.appendChild(imgDiv);

                const indicator = document.createElement('div');
                indicator.className = `w-2 h-2 rounded-full ${index === 0 ? 'bg-primary' : 'bg-gray-300'}`;
                indicator.onclick = () => {
                    currentSlide = index;
                    updateSlider();
                };
                sliderIndicators.appendChild(indicator);
            });

            // 显示模态框
            document.getElementById('itemDetailModal').classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
        }

        // 关闭菜品详情
        function closeItemDetail() {
            document.getElementById('itemDetailModal').classList.add('translate-x-full');
            overlay.classList.add('hidden');
        }

        // 更新轮播图
        function updateSlider() {
            const imageSlider = document.getElementById('imageSlider');
            const sliderIndicators = document.getElementById('sliderIndicators');
            imageSlider.style.transition = 'transform 0.3s ease';
            imageSlider.style.transform = `translateX(-${currentSlide * 100}%)`;

            // 更新指示器
            for (let i = 0; i < sliderIndicators.children.length; i++) {
                sliderIndicators.children[i].className = `w-2 h-2 rounded-full ${i === currentSlide ? 'bg-primary' : 'bg-gray-300'}`;
            }
        }

        // 获取分类名称
        function getCategoryName(category) {
            const categoryMap = {
                'all': '全部菜品',
                'pork': '🐖猪肉'
            };
            return categoryMap[category] || category;
        }



        // 渲染购物车项目
        function renderCartItems() {
            if (cart.length === 0) {
                emptyCart.classList.remove('hidden');
                cartItemsContainer.innerHTML = '';
                cartItemsContainer.appendChild(emptyCart);
                return;
            }

            emptyCart.classList.add('hidden');
            cartItemsContainer.innerHTML = '';

            cart.forEach(item => {
                const cartItemElement = document.createElement('div');
                cartItemElement.className = 'flex items-center justify-between py-3 border-b';
                cartItemElement.innerHTML = `
                    <div class="flex items-center">
                        <img src="${item.image}" alt="${item.name}" class="w-16 h-16 rounded object-cover">
                        <div class="ml-3">
                            <h4 class="font-bold">${item.name}</h4>
                            <p class="text-sm text-textLight">¥${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <button class="quantity-btn decrease-quantity bg-gray-200 text-gray-700 rounded-full w-6 h-6 flex items-center justify-center" data-id="${item.id}">
                            <i class="fa fa-minus"></i>
                        </button>
                        <span class="mx-2">${item.quantity}</span>
                        <button class="quantity-btn increase-quantity bg-gray-200 text-gray-700 rounded-full w-6 h-6 flex items-center justify-center" data-id="${item.id}">
                            <i class="fa fa-plus"></i>
                        </button>
                        <button class="remove-item ml-2 text-red-500" data-id="${item.id}">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                `;
                cartItemsContainer.appendChild(cartItemElement);
            });

            // 添加购物车项目的事件监听器
            document.querySelectorAll('.decrease-quantity').forEach(button => {
                button.addEventListener('click', () => {
                    const id = parseInt(button.dataset.id);
                    decreaseQuantity(id);
                });
            });

            document.querySelectorAll('.increase-quantity').forEach(button => {
                button.addEventListener('click', () => {
                    const id = parseInt(button.dataset.id);
                    increaseQuantity(id);
                });
            });

            document.querySelectorAll('.remove-item').forEach(button => {
                button.addEventListener('click', () => {
                    const id = parseInt(button.dataset.id);
                    removeFromCart(id);
                });
            });
        }

        // 减少数量
        function decreaseQuantity(id) {
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) {
                if (cartItem.quantity > 1) {
                    cartItem.quantity -= 1;
                } else {
                    removeFromCart(id);
                }
                updateCart();
            }
        }

        // 增加数量
        function increaseQuantity(id) {
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) {
                cartItem.quantity += 1;
                updateCart();
            }
        }

        // 从购物车移除
        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCart();
        }

        // 清空购物车
        function clearCart() {
            cart = [];
            updateCart();
            closeCartSidebar();
        }

        // 关闭购物车侧边栏
        function closeCartSidebar() {
            cartSidebar.classList.add('translate-x-full');
            overlay.classList.add('hidden');
        }





        // 添加到购物车
        function addToCart(id) {
            const item = menuItems.find(item => item.id === id);
            if (!item) return;

            const existingItem = cart.find(cartItem => cartItem.id === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    ...item,
                    quantity: 1
                });
            }

            updateCart();
        }

        // 更新购物车
        function updateCart() {
            // 更新购物车数量
            cartCount.textContent = cart.reduce((total, item) => total + item.quantity, 0);
            
            // 更新购物车项目
            if (cart.length === 0) {
                emptyCart.classList.remove('hidden');
                cartItemsContainer.innerHTML = '';
                cartItemsContainer.appendChild(emptyCart);
            } else {
                emptyCart.classList.add('hidden');
                cartItemsContainer.innerHTML = '';
                
                cart.forEach(item => {
                    const cartItemElement = document.createElement('div');
                    cartItemElement.className = 'flex items-center justify-between py-3 border-b';
                    cartItemElement.innerHTML = `
                        <div class="flex items-center">
                            <img src="${item.image}" alt="${item.name}" class="w-12 h-12 rounded object-cover">
                            <div class="ml-3">
                                <h4 class="font-bold">${item.name}</h4>
                                <p class="text-sm text-gray-500">¥${item.price.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="flex items-center">
                            <div class="flex items-center">
                                <button class="quantity-btn decrease-quantity bg-gray-200 text-gray-700 rounded-full w-6 h-6 flex items-center justify-center" data-id="${item.id}">
                                    <i class="fa fa-minus"></i>
                                </button>
                                <span class="mx-2">${item.quantity}</span>
                                <button class="quantity-btn increase-quantity bg-gray-200 text-gray-700 rounded-full w-6 h-6 flex items-center justify-center" data-id="${item.id}">
                                    <i class="fa fa-plus"></i>
                                </button>
                            </div>
                            <button class="remove-item ml-2 text-red-500" data-id="${item.id}">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    `;
                    cartItemsContainer.appendChild(cartItemElement);
                });

                // 添加购物车项目的事件监听器
                document.querySelectorAll('.decrease-quantity').forEach(button => {
                    button.addEventListener('click', () => {
                        const id = parseInt(button.dataset.id);
                        decreaseQuantity(id);
                    });
                });

                document.querySelectorAll('.increase-quantity').forEach(button => {
                    button.addEventListener('click', () => {
                        const id = parseInt(button.dataset.id);
                        increaseQuantity(id);
                    });
                });

                document.querySelectorAll('.remove-item').forEach(button => {
                    button.addEventListener('click', () => {
                        const id = parseInt(button.dataset.id);
                        removeFromCart(id);
                    });
                });
            }

            // 更新总价
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            totalPrice.textContent = `¥${total.toFixed(2)}`;
        }

        // 初始化应用
        init();
    </script>

</body></html>
